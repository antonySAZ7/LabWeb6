<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatsWeb</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            <h2>ChatsWeb</h2>
        </div>

        <div id="chatBox"></div>

        <div class="chat-input">
            <input id="messageInput" type="text" maxlength="140" placeholder="Escribe un mensaje...">
            <button id="sendBtn">enviar</button>
        </div>

        <div id="charCount">0 / 140</div>

    </div>

    <script src="script.js"></script>
</body>

</html>
